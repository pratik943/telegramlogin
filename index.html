<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore With Pratik</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:500px;
    margin:50px auto;
    text-align:center;
    padding:20px;
}

.card{
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    margin-top:10px;
    padding:12px 20px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="card">

<h1>Welcome to my test website</h1>

<p>Step 1</p>

<a href="https://t.me/ewclbase_bot" target="_blank">
Open Telegram Bot
</a>

<p style="margin-top:20px;">
Press Start in the bot and get your login code.
</p>

<input
id="otp"
placeholder="Enter 6 digit code">

<button onclick="login()">
Login
</button>

<div id="result"></div>

</div>

<script>
async function login(){

const otp =
document.getElementById("otp").value;

const response =
await fetch("/api/verify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
otp
})
});

const data =
await response.json();

if(data.success){

document.getElementById("result").innerHTML =
"✅ Welcome user " +
data.telegramId;

}else{

document.getElementById("result").innerHTML =
"❌ Invalid code";

}

}
</script>

</body>
</html>
